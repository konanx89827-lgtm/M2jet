<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M2JET - Metin2 Won & EP</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@600;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Rajdhani', sans-serif;
      background: #0f0f1e;
      min-height: 100vh;
      color: #fff;
    }
    
   .navbar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(102,126,234,0.4);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 3px solid #ffd700;
    }
   .navbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
   .menu-btn {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      transition: all 0.2s;
    }
   .menu-btn:hover {
      background: rgba(255,255,255,0.3);
    }
   .menu-btn span {
      width: 20px;
      height: 2px;
      background: white;
      border-radius: 2px;
      transition: all 0.3s;
    }
   .menu-btn.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }
   .menu-btn.active span:nth-child(2) {
      opacity: 0;
    }
   .menu-btn.active span:nth-child(3) {
      transform: rotate(-45deg) translate(7px, -6px);
    }
    
    /* M2JET LOGO + ICON */
   .logo-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }
   .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #ffd700 0%, #ffa500 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 0 15px rgba(255,215,0,0.6);
    }
   .logo {
      font-family: 'Cinzel', serif;
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(135deg, #ffd700 0%, #ffa500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
    }
    
   .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
      font-weight: 600;
    }
    button {
      padding: 10px 18px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    button:hover { 
      background: rgba(255,255,255,0.3);
    }

    /* SOL SIDEBAR MENÜ */
   .sidebar {
      position: fixed;
      left: -280px;
      top: 72px;
      width: 280px;
      height: calc(100vh - 72px);
      background: #1a1a2e;
      border-right: 2px solid #667eea;
      transition: left 0.3s ease;
      z-index: 98;
      overflow-y: auto;
      padding: 20px;
    }
   .sidebar.open {
      left: 0;
      box-shadow: 4px 0 20px rgba(0,0,0,0.8);
    }
   .sidebar-overlay {
      position: fixed;
      top: 72px;
      left: 0;
      width: 100%;
      height: calc(100vh - 72px);
      background: rgba(0,0,0,0.7);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 97;
    }
   .sidebar-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
   .menu-section {
      margin-bottom: 24px;
    }
   .menu-title {
      color: #ffd700;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
      padding: 0 12px;
    }
   .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      color: #aaa;
      text-decoration: none;
      margin-bottom: 4px;
      border: 1px solid transparent;
    }
   .menu-item:hover {
      background: #252542;
      color: #fff;
      border-color: #667eea;
    }
   .menu-item-icon {
      font-size: 22px;
      width: 28px;
      text-align: center;
    }
   .menu-item-text {
      font-weight: 600;
      font-size: 16px;
    }

   .container {
      max-width: 1300px;
      margin: 30px auto;
      padding: 0 20px;
    }
   .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 30px;
    }
   .card {
      background: #1a1a2e;
      border: 2px solid #2d2d44;
      border-radius: 16px;
      padding: 28px;
      transition: all 0.3s;
    }
   .card:hover {
      border-color: #667eea;
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(102,126,234,0.3);
    }
   .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }
   .card-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
   .card h3 {
      font-size: 20px;
      color: #fff;
      font-weight: 700;
      text-transform: uppercase;
    }
   .card-value {
      font-size: 38px;
      font-weight: 800;
      background: linear-gradient(135deg, #ffd700 0%, #ffa500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 14px 0;
    }
   .card-desc {
      color: #999;
      font-size: 15px;
      font-weight: 600;
    }

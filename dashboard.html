<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M2JET - Metin2 Won & EP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0f0f1e;
      min-height: 100vh;
      color: #fff;
    }
   .navbar {
      background: #667eea;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #ffd700;
    }
   .navbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
   .menu-btn {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border: 2px solid white;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
    }
   .menu-btn span {
      width: 20px;
      height: 2px;
      background: white;
    }
   .logo-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }
   .logo-icon {
      width: 40px;
      height: 40px;
      background: #ffd700;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
   .logo {
      font-size: 28px;
      font-weight: 900;
      color: #ffd700;
    }
   .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
    }
    button {
      padding: 10px 18px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 2px solid white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }
   .sidebar {
      position: fixed;
      left: -280px;
      top: 68px;
      width: 280px;
      height: calc(100vh - 68px);
      background: #1a1a2e;
      border-right: 2px solid #667eea;
      transition: left 0.3s;
      z-index: 98;
      overflow-y: auto;
      padding: 20px;
    }
   .sidebar.open {
      left: 0;
    }
   .sidebar-overlay {
      position: fixed;
      top: 68px;
      left: 0;
      width: 100%;
      height: calc(100vh - 68px);
      background: rgba(0,0,0,0.7);
      display: none;
      z-index: 97;
    }
   .sidebar-overlay.show {
      display: block;
    }
   .menu-section {
      margin-bottom: 24px;
    }
   .menu-title {
      color: #ffd700;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
      padding: 0 12px;
    }
   .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: #aaa;
      text-decoration: none;
      margin-bottom: 4px;
    }
   .menu-item:hover {
      background: #252542;
      color: #fff;
    }
   .menu-item-icon {
      font-size: 22px;
      width: 28px;
      text-align: center;
    }
   .menu-item-text {
      font-weight: 600;
      font-size: 16px;
    }
   .container {
      max-width: 1300px;
      margin: 30px auto;
      padding: 0 20px;
    }
   .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 30px;
    }
   .card {
      background: #1a1a2e;
      border: 2px solid #2d2d44;
      border-radius: 16px;
      padding: 28px;
    }
   .card:hover {
      border-color: #667eea;
    }
   .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }
   .card-icon {
      width: 56px;
      height: 56px;
      background: #667eea;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
   .card h3 {
      font-size: 20px;
      color: #fff;
      font-weight: 700;
    }
   .card-value {
      font-size: 38px;
      font-weight: 800;
      color: #ffd700;
      margin: 14px 0;
    }
   .card-desc {
      color: #999;
      font-size: 15px;
    }
   .card-button {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      background: #667eea;
      border: 2px solid #667eea;
      border-radius: 10px;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
   .duyuru {
      background: #1a1a2e;
      border: 2px solid #2d2d44;
      border-left: 5px solid #ffd700;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
   .duyuru h3 {
      color: #ffd700;
      margin-bottom: 16px;
      font-size: 22px;
      font-weight: 800;
    }
   .duyuru-item {
      padding: 16px;
      background: #0f0f1e;
      border-radius: 10px;
      margin-bottom: 12px;
      border-left: 4px solid #667eea;
    }
   .duyuru-title {
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      font-size: 17px;
    }
   .duyuru-text {
      color: #bbb;
      font-size: 15px;
    }
   .duyuru-date {
      color: #666;
      font-size: 13px;
      margin-top: 8px;
    }
   .reklam-alan {
      background: #1a1a2e;
      border: 3px dashed #667eea;
      border-radius: 20px;
      padding: 50px;
      text-align: center;
      margin-bottom: 24px;
    }
   .reklam-alan h3 {
      color: #ffd700;
      margin-bottom: 14px;
      font-size: 24px;
      font-weight: 800;
    }
   .reklam-alan p {
      color: #aaa;
      margin-bottom: 24px;
      font-size: 16px;
    }
   .admin-btn {
      width: 100%;
      padding: 18px;
      background: #d63031;
      color: white;
      border: 3px solid #d63031;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 24px;
    }
   .loading {
      text-align: center;
      padding: 60px;
      color: #999;
      font-size: 18px;
    }
    @media (max-width: 768px) {
     .grid { grid-template-columns: 1fr; }
     .logo { font-size: 24px; }
    }
  </style>
</head>

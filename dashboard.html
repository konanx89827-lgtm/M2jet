<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M2JET - Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0f0f1e;
      min-height: 100vh;
      color: #fff;
    }
   .navbar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(102,126,234,0.4);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 3px solid #764ba2;
    }
   .navbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
   .menu-btn {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      transition: all 0.2s;
    }
   .menu-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.05);
    }
   .menu-btn span {
      width: 20px;
      height: 2px;
      background: white;
      border-radius: 2px;
      transition: all 0.3s;
    }
   .menu-btn.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }
   .menu-btn.active span:nth-child(2) {
      opacity: 0;
    }
   .menu-btn.active span:nth-child(3) {
      transform: rotate(-45deg) translate(7px, -6px);
    }
   .logo {
      font-size: 24px;
      font-weight: 900;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
   .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
    }
    button {
      padding: 10px 18px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.2s;
    }
    button:hover { 
      background: rgba(255,255,255,0.3);
      transform: scale(1.05);
    }

    /* SOL SIDEBAR MENÜ */
   .sidebar {
      position: fixed;
      left: -280px;
      top: 68px;
      width: 280px;
      height: calc(100vh - 68px);
      background: #1a1a2e;
      border-right: 2px solid #667eea;
      transition: left 0.3s ease;
      z-index: 98;
      overflow-y: auto;
      padding: 20px;
    }
   .sidebar.open {
      left: 0;
      box-shadow: 4px 0 20px rgba(0,0,0,0.8);
    }
   .sidebar-overlay {
      position: fixed;
      top: 68px;
      left: 0;
      width: 100%;
      height: calc(100vh - 68px);
      background: rgba(0,0,0,0.7);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 97;
      backdrop-filter: blur(5px);
    }
   .sidebar-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
   .menu-section {
      margin-bottom: 24px;
    }
   .menu-title {
      color: #667eea;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding: 0 12px;
    }
   .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      color: #aaa;
      text-decoration: none;
      margin-bottom: 4px;
    }

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M2JET - Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0f0f1e;
      color: #fff;
      padding: 20px;
    }
    .navbar {
      background: #667eea;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 12px;
      margin-bottom: 30px;
    }
    .logo { font-size: 24px; font-weight: 900; }
    button {
      padding: 10px 18px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 2px solid white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .card {
      background: #1a1a2e;
      border: 2px solid #2d2d44;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
    }
    .card h3 { color: #667eea; margin-bottom: 12px; }
    .test { color: #00ff00; font-size: 24px; font-weight: 800; }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">M2JET</div>
    <button onclick="window.location.href='index.html'">Çıkış Yap</button>
  </div>
  
  <div class="container">
    <div class="card">
      <h3>✅ TEST BAŞARILI</h3>
      <p class="test">DASHBOARD AÇILDI!</p>
      <p>Bu yazıyı görüyorsan Firebase/Javascript sorunu var demektir.</p>
    </div>
    
    <div class="card">
      <h3>👤 Kullanıcı</h3>
      <p>test@test.com</p>
    </div>
    
    <div class="card">
      <h3>📢 Duyuru</h3>
      <p>Sunucu aktif. Eventler yakında.</p>
    </div>
  </div>
</body>
</html>

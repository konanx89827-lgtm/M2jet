<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M2JET - Giriş Yap</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
 .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
 .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
 .tabs {
      display: flex;
      margin-bottom: 30px;
      border-bottom: 2px solid #eee;
    }
 .tab {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      font-size: 16px;
      font-weight: 600;
      color: #999;
      cursor: pointer;
      transition: all 0.3s;
    }
 .tab.active {
      color: #667eea;
      border-bottom: 3px solid #667eea;
      margin-bottom: -2px;
    }
 .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
 .error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
 .success {
      background: #efe;
      color: #3c3;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
 .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>M2JET</h1>
    <p class="subtitle">Hesabına giriş yap veya kayıt ol</p>

    <div class="tabs">
      <button class="tab active" onclick="showLogin()">Giriş Yap</button>
      <button class="tab" onclick="showRegister()">Kayıt Ol</button>
    </div>

    <div id="error" class="error"></div>
    <div id="success" class="success"></div>

    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="ornek@mail.com">
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button id="loginBtn" onclick="login()">Giriş Yap</button>
    </div>

    <div id="registerForm" class="hidden">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="registerEmail" placeholder="ornek@mail.com">
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="registerPassword" placeholder="En az 6 karakter">
      </div>
      <button id="registerBtn" onclick="register()">Kayıt Ol</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBxIB0JQ8-vDEyX7PaAvALMRj0hP6aav1k",
      authDomain: "m2jet-auth.firebaseapp.com",
      projectId: "m2jet-auth",
      storageBucket: "m2jet-auth.firebasestorage.app",
      messagingSenderId: "270629847779",
      appId: "1:270629847779:web:14b899f626ec96d55a58c4",
      measurementId: "G-2LXJBD3YJV"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        window.location.href = 'dashboard.html';
      }
    });

    window.showLogin = function() {
      document.getElementById('loginForm').classList.remove('hidden');
      document.getElementById('registerForm').classList.add('hidden');
      document.querySelectorAll('.tab')[0].classList.add('active');
      document.querySelectorAll('.tab')[1].classList.remove('active');
      hideMessages();
    }

    window.showRegister = function() {
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registerForm').classList.remove('hidden');
      document.querySelectorAll('.tab')[0].classList.remove('active');
      document.querySelectorAll('.tab')[1].classList.add('active');
      hideMessages();
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('success').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('success');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('error').style.display = 'none';
    }

    function hideMessages() {
      document.getElementById('error').style.display = 'none';
      document.getElementById('success').style.display = 'none';
    }

    window.register = async function() {
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;
      const btn = document.getElementById('registerBtn');

      if (!email ||!password) {
        showError('Email ve şifre boş olamaz!');
        return;
      }
      if (password.length < 6) {
        showError('Şifre en az 6 karakter olmalı!');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Kayıt yapılıyor...';
      hideMessages();

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await setDoc(doc(db, 'users', user.uid), {
          email: user.email,
          role: 'user',
          createdAt: serverTimestamp(),
          lastLogin: serverTimestamp()
        });

        showSuccess('Kayıt başarılı! Yönlendiriliyorsun...');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);

      } catch (error) {
        console.error(error);
        if (error.code === 'auth/email-already-in-use') {
          showError('Bu email zaten kayıtlı!');
        } else if (error.code === 'auth/invalid-email') {
          showError('Geçersiz email adresi!');
        } else {
          showError('Hata: ' + error.message);
        }
        btn.disabled = false;
        btn.textContent = 'Kayıt Ol';
      }
    }

    window.login = async function() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');

      if (!email ||!password) {
        showError('Email ve şifre boş olamaz!');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Giriş yapılıyor...';
      hideMessages();

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await setDoc(doc(db, 'users', user.uid), {
          lastLogin: serverTimestamp()
        }, { merge: true });

        showSuccess('Giriş başarılı! Yönlendiriliyorsun...');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);

      } catch (error) {
        console.error(error);
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
          showError('Email veya şifre hatalı!');
        } else if (error.code === 'auth/invalid-email') {
          showError('Geçersiz email adresi!');
        } else {
          showError('Hata: ' + error.message);
        }
        btn.disabled = false;
        btn.textContent = 'Giriş Yap';
      }
    }
  </script>
</body>
</html>
